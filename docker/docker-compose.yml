version: '3.8'
services:
  certmagi:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./certs:/home/certmagicc/certs
      - ./scripts:/home/certmagicc/scripts
    ports:
      - "8080:8080"
    environment:
      - IPFS_PATH=/home/certmagicc/.ipfs
    command: bash
